<!doctype html>
<html lang="en" ng-app="bookKeepingPortal">
  <head>
    <meta charset="utf-8" />
    <title>Book Keeping Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <div class="brand-mark">BK</div>
        <div>
          <h1>Book Keeping Portal</h1>
          <p>Reimbursements and account access</p>
        </div>
      </div>
      <nav class="app-nav">
        <a href="#!/reimbursement" class="nav-link">Create reimbursement</a>
        <a href="#!/login" class="nav-link">Login</a>
      </nav>
    </header>

    <main class="app-main" ng-view></main>

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.min.js"></script>
    <script src="https://unpkg.com/rxjs@7.8.1/dist/bundles/rxjs.umd.min.js"></script>
    <script src="env.local.js"></script>
    <script src="env.js"></script>
    <script src="app.js"></script>
  </body>
</html>
